name: Update readme with blog posts
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: JasonEtco/rss-to-readme@v1
        with:
          feed-url: https://elboudali.com/rss.xml
          readme-section: feed
          max: 5
          template: "* [{{ title }}]({{ link }})"
